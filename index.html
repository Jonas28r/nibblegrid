<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nibble Grid - Arcade Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="hud">
            <h1>NIBBLE GRID</h1>
            <div class="stats">
                <p>Nivel: <span id="level-val">1</span></p>
                <p>Puntos: <span id="score-val">0</span></p>
                <p>Monedas: $<span id="coins-val">0</span></p>
            </div>
            
            <div class="shop">
                <h3>Tienda de Skins</h3>
                <div class="shop-item" id="skin-classic" onclick="buySkin('classic', 0)">
                    <span class="skin-color" style="background: #00ff66;"></span> Verde
                    <button class="active">Equipado</button>
                </div>
                <div class="shop-item" id="skin-neon" onclick="buySkin('neon', 30)">
                    <span class="skin-color" style="background: #00d9ff;"></span> Neon
                    <button>$30</button>
                </div>
                <div class="shop-item" id="skin-gold" onclick="buySkin('gold', 75)">
                    <span class="skin-color" style="background: #ffd700;"></span> Dorado
                    <button>$75</button>
                </div>
            </div>

            <div id="powerup-status" class="hidden">⭐ ¡INMUNE! ⭐</div>
        </div>

        <div class="canvas-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="overlay" class="overlay">
                <div class="overlay-content">
                    <h2 id="overlay-title">NIBBLE GRID</h2>
                    <p id="overlay-desc">PC: Usa las flechas o WASD.<br>Móvil: Desliza el dedo por la pantalla.</p>
                    <button id="start-btn" onclick="startGame()">Jugar Ahora</button>
                    
                    <div class="credits">
                        <p><strong>Créditos de Honor:</strong></p>
                        <p>Lógica: Creadores de Arcade (1976)</p>
                        <p>Adaptación: Taneli Armanto (Nokia)</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
